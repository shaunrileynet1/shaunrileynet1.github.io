<!DOCTYPE html>
<html>
<head>
<title>shaunriley.net</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, noarchive, nosnippet, noimageindex">
<meta name="description" content="">
<meta http-equiv="X-Robots-Tag" content="noindex, noarchive, nosnippet, noimageindex">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; script-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
<meta name="referrer" content="no-referrer">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #d4d0c8;
    --dim: #555;
    --accent: #4a9eff;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: var(--text);
  }

  .terminal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 560px;
    animation: fadeIn 0.5s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .titlebar {
    background: var(--border);
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .dot.red    { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green  { background: #28c840; }

  .titlebar-label {
    flex: 1;
    text-align: center;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .body {
    padding: 2rem 2rem 2.5rem;
  }

  .prompt {
    font-size: 0.8rem;
    color: var(--dim);
    margin-bottom: 1.2rem;
  }

  .prompt span {
    color: #ff5f57;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: normal;
    color: #fff;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 0.95rem;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .output {
    border-top: 1px solid var(--border);
    padding-top: 1.2rem;
    font-size: 0.75rem;
    color: var(--dim);
    line-height: 2;
  }

  .output .key { color: #888; }
  .output .val { color: var(--text); }
  .output .val a { color: inherit; text-decoration: none; }
  .output .val a:hover { color: var(--accent); }

  .cursor {
    display: inline-block;
    width: 0.5em;
    height: 0.9em;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1.1s step-end infinite;
    opacity: 0.8;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="titlebar-label">shaunriley.net — bash</div>
    </div>
    <div class="body">
      <div class="prompt"><span>root@localhost</span>:~# ./website.sh</div>
      <h1>shaunriley.net</h1>
      <p class="tagline">it was cheaper than .com.<span class="cursor"></span></p>
      <div class="output">
        <div><span class="key">status&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="val">online (i'm surprised too)</span></div>
        <div><span class="key">content&nbsp;&nbsp;&nbsp;</span> <span class="val">none</span></div>
        <div><span class="key">mail&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="val"><a href="http://www.mxguarddog.com/">spam filter in the cloud</a></span></div>
      </div>
    </div>
  </div>
</body>
</html>
