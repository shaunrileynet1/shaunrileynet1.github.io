<!DOCTYPE html>
<html>
<head>
<title>shaunriley.net</title>.
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, noarchive, nosnippet, noimageindex">
<meta name="description" content="">
<meta http-equiv="X-Robots-Tag" content="noindex, noarchive, nosnippet, noimageindex">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; script-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
<meta name="referrer" content="no-referrer">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #d4d0c8;
    --dim: #555;
    --accent: #4a9eff;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: var(--text);
  }

  /* ── Terminal window ── */
  .terminal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 560px;
    animation: fadeIn 0.5s ease both;
    transition:
      width 0.35s cubic-bezier(0.4,0,0.2,1),
      max-width 0.35s cubic-bezier(0.4,0,0.2,1),
      height 0.35s cubic-bezier(0.4,0,0.2,1),
      opacity 0.25s ease,
      transform 0.35s cubic-bezier(0.4,0,0.2,1),
      border-radius 0.35s ease;
    overflow: hidden;
    position: relative;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Minimized state ── */
  .terminal.minimized .body {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    opacity: 0;
  }
  .terminal.minimized {
    max-width: 240px;
  }

  /* ── Maximized state ── */
  .terminal.maximized {
    position: fixed;
    inset: 0;
    max-width: 100vw;
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    border: none;
    z-index: 9999;
    display: flex;
    flex-direction: column;
  }
  .terminal.maximized .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* ── Closed / session-ended state ── */
  .terminal.closed {
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
  }
  .session-ended {
    display: none;
    font-size: 0.75rem;
    color: var(--dim);
    text-align: center;
    font-family: 'DM Mono', monospace;
    animation: fadeIn 0.4s ease both;
  }
  .session-ended.visible {
    display: block;
  }

  /* ── Titlebar ── */
  .titlebar {
    background: var(--border);
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  /* ── Traffic-light dots ── */
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: filter 0.15s ease;
    /* icon glyphs hidden by default, shown on titlebar hover */
  }
  .dot::after {
    content: '';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    line-height: 10px;
    text-align: center;
    color: rgba(0,0,0,0.55);
    font-weight: 900;
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  .dot.red::after    { content: '✕'; }
  .dot.yellow::after { content: '−'; }
  .dot.green::after  { content: '+'; }

  /* Show icons on titlebar hover (Mac behaviour) */
  .titlebar:hover .dot::after { opacity: 1; }

  .dot.red    { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green  { background: #28c840; }

  .dot.red:hover    { filter: brightness(1.2); }
  .dot.yellow:hover { filter: brightness(1.2); }
  .dot.green:hover  { filter: brightness(1.2); }

  /* Active press feedback */
  .dot:active { filter: brightness(0.75) !important; transform: scale(0.88); }

  .titlebar-label {
    flex: 1;
    text-align: center;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    transition: opacity 0.3s;
  }

  /* ── Body ── */
  .body {
    padding: 2rem 2rem 2.5rem;
    transition:
      max-height 0.35s cubic-bezier(0.4,0,0.2,1),
      padding 0.35s cubic-bezier(0.4,0,0.2,1),
      opacity 0.25s ease;
    max-height: 600px;
    opacity: 1;
    overflow: hidden;
  }

  .prompt {
    font-size: 0.8rem;
    color: var(--dim);
    margin-bottom: 1.2rem;
  }

  .prompt span {
    color: #ff5f57;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: normal;
    color: #fff;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 0.95rem;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .output {
    border-top: 1px solid var(--border);
    padding-top: 1.2rem;
    font-size: 0.75rem;
    color: var(--dim);
    line-height: 2;
  }

  .output .key { color: #888; }
  .output .val { color: var(--text); }
  .output .val a { color: inherit; text-decoration: none; }
  .output .val a:hover { color: var(--accent); }

  .output .comment a {
    color: #4a7a4a;
    text-decoration: none;
    font-style: italic;
    transition: color 0.15s;
  }
  .output .comment a:hover { color: #6abf6a; }

  .cursor {
    display: inline-block;
    width: 0.5em;
    height: 0.9em;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1.1s step-end infinite;
    opacity: 0.8;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="terminal" id="terminal">
    <div class="titlebar" id="titlebar">
      <div class="dot red"    id="btn-close"    title="Close"></div>
      <div class="dot yellow" id="btn-minimize" title="Minimize"></div>
      <div class="dot green"  id="btn-maximize" title="Maximize"></div>
      <div class="titlebar-label">shaunriley.net — bash</div>
    </div>
    <div class="body" id="body">
      <div class="prompt"><span>root@localhost</span>:~# ./website.sh</div>
      <h1>shaunriley.net</h1>
      <p class="tagline">it was cheaper than .com.<span class="cursor"></span></p>
      <div class="output">
        <div><span class="key">status&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="val">online (i'm surprised too)</span></div>
        <div><span class="key">content&nbsp;&nbsp;&nbsp;</span> <span class="val">none</span></div>
        <div><span class="comment"><a href="http://www.mxguarddog.com/"># spam filter in the cloud</a></span></div>
      </div>
    </div>
  </div>

  <div class="session-ended" id="session-ended">
    [process exited]<br>session terminated.
  </div>

<script>
  const terminal  = document.getElementById('terminal');
  const sessionMsg = document.getElementById('session-ended');

  let isMinimized = false;
  let isMaximized = false;

  /* ── Close ── */
  document.getElementById('btn-close').addEventListener('click', () => {
    terminal.classList.add('closed');
    setTimeout(() => {
      terminal.style.display = 'none';
      sessionMsg.classList.add('visible');
    }, 280);
  });

  /* ── Minimize ── */
  document.getElementById('btn-minimize').addEventListener('click', () => {
    if (isMaximized) return; // ignore while maximized, like real macOS
    isMinimized = !isMinimized;
    terminal.classList.toggle('minimized', isMinimized);
  });

  /* ── Maximize / restore ── */
  document.getElementById('btn-maximize').addEventListener('click', () => {
    if (isMinimized) {
      // restore from minimized first
      isMinimized = false;
      terminal.classList.remove('minimized');
    }
    isMaximized = !isMaximized;
    terminal.classList.toggle('maximized', isMaximized);
  });

  /* Double-click titlebar to maximize (classic Mac behaviour) */
  document.getElementById('titlebar').addEventListener('dblclick', (e) => {
    if (e.target.classList.contains('dot')) return;
    isMaximized = !isMaximized;
    terminal.classList.toggle('maximized', isMaximized);
    if (isMaximized && isMinimized) {
      isMinimized = false;
      terminal.classList.remove('minimized');
    }
  });

  /* ── Konami code easter egg ── */
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let konamiPos = 0;
  let konamiDone = false;

  document.addEventListener('keydown', (e) => {
    if (konamiDone) return;
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (key === KONAMI[konamiPos]) {
      konamiPos++;
      if (konamiPos === KONAMI.length) {
        konamiDone = true;
        triggerEasterEgg();
      }
    } else {
      konamiPos = key === KONAMI[0] ? 1 : 0;
    }
  });

  function triggerEasterEgg() {
    const output = document.querySelector('.output');

    // new prompt line
    const promptLine = document.createElement('div');
    promptLine.style.marginTop = '0.8rem';
    promptLine.style.color = 'var(--dim)';
    promptLine.style.fontSize = '0.75rem';
    promptLine.innerHTML = '<span style="color:#ff5f57">root@localhost</span>:~# ls -la';
    output.appendChild(promptLine);

    // ls output lines, revealed one at a time
    const lines = [
      'total 4',
      'drwxr-xr-x  2 root root   64 Jan  1 00:00 <span style="color:var(--accent)">.</span>',
      'drwxr-xr-x 18 root root  576 Jan  1 00:00 <span style="color:var(--accent)">..</span>',
      '-rwxr-xr-x  1 root root  128 Jan  1 00:00 <span style="color:var(--text)">website.sh</span>',
      '<span style="color:var(--dim); font-style:italic"># that\'s it. there is nothing else.</span>',
    ];

    lines.forEach((line, i) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.style.fontSize = '0.75rem';
        el.style.color = 'var(--dim)';
        el.style.lineHeight = '1.8';
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.2s ease';
        el.innerHTML = line;
        output.appendChild(el);
        requestAnimationFrame(() => { el.style.opacity = '1'; });

        // final cursor prompt after last line
        if (i === lines.length - 1) {
          setTimeout(() => {
            const cursor = document.createElement('div');
            cursor.style.marginTop = '0.4rem';
            cursor.style.fontSize = '0.75rem';
            cursor.style.color = 'var(--dim)';
            cursor.innerHTML = '<span style="color:#ff5f57">root@localhost</span>:~# <span class="cursor"></span>';
            output.appendChild(cursor);
          }, 200);
        }
      }, i * 120);
    });
  }
</script>
</body>
</html>
