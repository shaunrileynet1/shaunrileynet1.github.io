<!DOCTYPE html>
<html>
<head>
<title>shaunriley.net</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, noarchive, nosnippet, noimageindex">
<meta name="description" content="">
<meta http-equiv="X-Robots-Tag" content="noindex, noarchive, nosnippet, noimageindex">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; script-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
<meta name="referrer" content="no-referrer">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #d4d0c8;
    --dim: #555;
    --accent: #4a9eff;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', 'Courier New', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: var(--text);
  }

  /* ── Terminal window ── */
  .terminal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 560px;
    animation: fadeIn 0.5s ease both;
    transition:
      width 0.35s cubic-bezier(0.4,0,0.2,1),
      max-width 0.35s cubic-bezier(0.4,0,0.2,1),
      height 0.35s cubic-bezier(0.4,0,0.2,1),
      opacity 0.25s ease,
      transform 0.35s cubic-bezier(0.4,0,0.2,1),
      border-radius 0.35s ease;
    overflow: hidden;
    position: relative;
  }
  .terminal.dragging {
    transition: none;
    user-select: none;
  }
  .resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 16px;
    height: 16px;
    cursor: se-resize;
    z-index: 10;
    overflow: hidden;
  }
  .resize-handle::before,
  .resize-handle::after {
    content: '';
    position: absolute;
    background: var(--dim);
    width: 10px;
    height: 1px;
    border-radius: 1px;
    transform-origin: right center;
    transition: background 0.15s ease;
  }
  .resize-handle::before {
    bottom: 5px;
    right: 2px;
    transform: rotate(-45deg);
  }
  .resize-handle::after {
    bottom: 9px;
    right: 2px;
    transform: rotate(-45deg);
  }
  .resize-handle:hover::before,
  .resize-handle:hover::after {
    background: var(--text);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Minimized state ── */
  .terminal.minimized .body {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    opacity: 0;
  }
  .terminal.minimized {
    max-width: 240px;
  }

  /* ── Maximized state ── */
  .terminal.maximized {
    position: fixed;
    inset: 0;
    max-width: 100vw;
    width: 100vw;
    height: 100dvh;
    border-radius: 0;
    border: none;
    z-index: 9999;
    display: flex;
    flex-direction: column;
  }
  .terminal.maximized .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* ── Closed / session-ended state ── */
  .terminal.closed {
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
  }
  .session-ended {
    display: none;
    font-size: 0.75rem;
    color: var(--dim);
    text-align: center;
    font-family: 'DM Mono', monospace;
    animation: fadeIn 0.4s ease both;
  }
  .session-ended.visible {
    display: block;
  }

  /* ── Titlebar ── */
  .titlebar {
    background: var(--border);
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
    cursor: grab;
  }
  .titlebar:active { cursor: grabbing; }

  /* ── Traffic-light dots ── */
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: filter 0.15s ease;
  }
  .dot::after {
    content: '';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    line-height: 10px;
    text-align: center;
    color: rgba(0,0,0,0.55);
    font-weight: 900;
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  .dot.red::after    { content: '✕'; }
  .dot.yellow::after { content: '−'; }
  .dot.green::after  { content: '+'; }

  .titlebar:hover .dot::after { opacity: 1; }

  .dot.red    { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green  { background: #28c840; }

  .dot.red:hover    { filter: brightness(1.2); }
  .dot.yellow:hover { filter: brightness(1.2); }
  .dot.green:hover  { filter: brightness(1.2); }

  .dot:active { filter: brightness(0.75) !important; transform: scale(0.88); }

  .titlebar-label {
    flex: 1;
    text-align: center;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    transition: opacity 0.3s;
  }

  /* ── Body ── */
  .body {
    padding: 2rem 2rem 2.5rem;
    transition:
      max-height 0.35s cubic-bezier(0.4,0,0.2,1),
      padding 0.35s cubic-bezier(0.4,0,0.2,1),
      opacity 0.25s ease;
    max-height: 800px;
    opacity: 1;
    overflow: hidden;
  }

  .prompt {
    font-size: 0.8rem;
    color: var(--dim);
    margin-bottom: 1.2rem;
  }

  .prompt span {
    color: #ff5f57;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: normal;
    color: #fff;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 0.95rem;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .output {
    border-top: 1px solid var(--border);
    padding-top: 1.2rem;
    font-size: 0.75rem;
    color: var(--dim);
    line-height: 2;
  }

  .output .key { color: #888; }
  .output .val { color: var(--text); }
  .output .val a { color: inherit; text-decoration: none; }
  .output .val a:hover { color: var(--accent); }

  .output .comment a {
    color: #4a7a4a;
    text-decoration: none;
    font-style: italic;
    transition: color 0.15s;
  }
  .output .comment a:hover { color: #6abf6a; }

  /* ── Interactive input area ── */
  .input-area {
    margin-top: 1.5rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }

  .input-line {
    display: flex;
    align-items: center;
    font-size: 0.75rem;
    color: var(--dim);
    gap: 0.4rem;
  }

  .input-line .ps1 { color: #ff5f57; white-space: nowrap; }

  .input-line input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 0.75rem;
    flex: 1;
    caret-color: var(--accent);
    min-width: 0;
  }

  .response-log {
    margin-top: 0.5rem;
    font-size: 0.75rem;
    line-height: 1.9;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .response-log::-webkit-scrollbar { display: none; }

  .response-line {
    animation: fadeIn 0.3s ease both;
  }

  .response-line.cmd {
    color: var(--dim);
  }

  .response-line.cmd .ps1 { color: #ff5f57; }

  .response-line.err {
    color: #ff5f57;
  }

  .response-line.info {
    color: #888;
    font-style: italic;
  }

  .response-line.warn {
    color: #febc2e;
    font-style: italic;
  }

  .response-line.ok {
    color: #28c840;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="terminal" id="terminal">
    <div class="titlebar" id="titlebar">
      <div class="dot red"    id="btn-close"    title="Close"></div>
      <div class="dot yellow" id="btn-minimize" title="Minimize"></div>
      <div class="dot green"  id="btn-maximize" title="Maximize"></div>
      <div class="titlebar-label">shaunriley.net — bash</div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="body" id="body">
      <div class="prompt"><span>root@localhost</span>:~# ./website.sh</div>
      <h1>shaunriley.net</h1>
      <p class="tagline">it was cheaper than .com.</p>
      <div class="output">
        <div><span class="key">status&nbsp;&nbsp;&nbsp;&nbsp;</span> <span class="val">online (i'm surprised too)</span></div>
        <div><span class="key">content&nbsp;&nbsp;&nbsp;</span> <span class="val">none</span></div>
        <div><span class="comment"><a href="http://www.mxguarddog.com/"># spam filter in the cloud</a></span></div>
      </div>

      <div class="input-area">
        <div class="response-log" id="response-log"></div>
        <div class="input-line">
          <span class="ps1">root@localhost:~#</span>
          <input type="text" id="cmd-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
        </div>
      </div>
    </div>
  </div>

  <div class="session-ended" id="session-ended">
    [process exited]<br>session terminated.
  </div>

<script>
  const terminal   = document.getElementById('terminal');
  const sessionMsg = document.getElementById('session-ended');
  const cmdInput   = document.getElementById('cmd-input');
  const log        = document.getElementById('response-log');

  let isMinimized = false;
  let isMaximized = false;
  let enterCount  = 0;
  let isClosed    = false;

  /* ── Responses for repeated attempts ── */
  const responses = [
    // index 0: first attempt — generic error
    (cmd) => [
      { cls: 'err', text: `-bash: ${cmd || '(empty)'}: command not found` },
    ],
    // index 1
    () => [
      { cls: 'info', text: "i wasn't kidding. no content here." },
    ],
    // index 2
    () => [
      { cls: 'warn', text: "bold strategy, hitting enter again. let me know how that works out." },
    ],
    // index 3
    () => [
      { cls: 'info', text: "genuinely unclear what you think is going to happen here." },
    ],
    // index 4
    () => [
      { cls: 'warn', text: "i admire the commitment. the answer remains: no." },
    ],
    // index 5
    () => [
      { cls: 'info', text: "at this point you've spent more time here than i spent building this." },
    ],
    // index 6
    () => [
      { cls: 'warn', text: "what exactly are you hoping to find? a blog? a portfolio? a cry for help?" },
    ],
    // index 7
    () => [
      { cls: 'info', text: "fine. here's the content: there is no content. we've come full circle." },
    ],
    // index 8
    () => [
      { cls: 'warn', text: "i'm telling the spam filter about you." },
    ],
    // index 9+
    () => [
      { cls: 'err', text: "ERROR: user has exceeded the 'looking for content that doesn't exist' quota." },
      { cls: 'info', text: "please try again when i've put something here. (don't hold your breath.)" },
    ],
  ];

  function addLine(cls, text) {
    const div = document.createElement('div');
    div.className = `response-line ${cls}`;
    div.textContent = text;
    log.appendChild(div);
  }

  function handleCommand(raw) {
    const cmd = raw.trim();

    // Echo the command they typed
    const echo = document.createElement('div');
    echo.className = 'response-line cmd';
    echo.innerHTML = `<span class="ps1">root@localhost:~#</span> ${escapeHtml(cmd)}`;
    log.appendChild(echo);

    // Check for special commands first
    if (cmd.toLowerCase() === 'help') {
      addLine('err', 'bash: help: none found. if you find some, let me know.');
      addLine('info', 'have you tried turning it off and back on again?');
    } else {
      // Pick the right response
      const idx = Math.min(enterCount, responses.length - 1);
      const lines = responses[idx](cmd);
      lines.forEach(l => addLine(l.cls, l.text));
      enterCount++;
    }

    // Scroll into view
    log.scrollTop = log.scrollHeight;
  }

  function escapeHtml(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  cmdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = cmdInput.value;
      cmdInput.value = '';
      handleCommand(val);
    }
  });

  /* ── Window controls ── */
  document.getElementById('btn-close').addEventListener('click', () => {
    isClosed = true;
    terminal.classList.add('closed');
    setTimeout(() => {
      terminal.style.display = 'none';
      sessionMsg.classList.add('visible');
    }, 280);
  });

  function clearDragStyles() {
    terminal.style.position = '';
    terminal.style.left = '';
    terminal.style.top = '';
    terminal.style.margin = '';
    terminal.style.maxWidth = '';
    terminal.style.width = '';
    terminal.style.height = '';
    terminal.querySelector('.body').style.maxHeight = '';
  }

  document.getElementById('btn-minimize').addEventListener('click', () => {
    if (isMaximized) return;
    isMinimized = !isMinimized;
    terminal.classList.toggle('minimized', isMinimized);
  });

  document.getElementById('btn-maximize').addEventListener('click', () => {
    if (isMinimized) {
      isMinimized = false;
      terminal.classList.remove('minimized');
    }
    isMaximized = !isMaximized;
    clearDragStyles();
    terminal.classList.toggle('maximized', isMaximized);
  });

  document.getElementById('titlebar').addEventListener('dblclick', (e) => {
    if (e.target.classList.contains('dot')) return;
    isMaximized = !isMaximized;
    clearDragStyles();
    terminal.classList.toggle('maximized', isMaximized);
    if (isMaximized && isMinimized) {
      isMinimized = false;
      terminal.classList.remove('minimized');
    }
  });

  /* Keep input focused when clicking anywhere in the terminal body */
  document.getElementById('body').addEventListener('click', () => {
    cmdInput.focus();
  });

  /* ── Drag to move ── */
  let isDragging = false;
  let dragOffsetX = 0;
  let dragOffsetY = 0;

  document.getElementById('titlebar').addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('dot')) return;

    // If maximized, restore to normal then start dragging from click position
    if (isMaximized) {
      isMaximized = false;
      terminal.classList.remove('maximized');
      // Restore to fixed, centered under the cursor
      const w = 560;
      const left = Math.min(Math.max(e.clientX - w / 2, 0), window.innerWidth - w);
      const top = Math.max(e.clientY - 10, 0);
      terminal.style.position = 'fixed';
      terminal.style.left = left + 'px';
      terminal.style.top = top + 'px';
      terminal.style.margin = '0';
      terminal.style.maxWidth = w + 'px';
      dragOffsetX = e.clientX - left;
      dragOffsetY = e.clientY - top;
      isDragging = true;
      terminal.classList.add('dragging');
      e.preventDefault();
      return;
    }

    // Switch to fixed positioning on first drag
    if (!terminal.style.position || terminal.style.position !== 'fixed') {
      const rect = terminal.getBoundingClientRect();
      terminal.style.position = 'fixed';
      terminal.style.left = rect.left + 'px';
      terminal.style.top = rect.top + 'px';
      terminal.style.margin = '0';
      terminal.style.maxWidth = terminal.offsetWidth + 'px';
    }

    isDragging = true;
    dragOffsetX = e.clientX - terminal.getBoundingClientRect().left;
    dragOffsetY = e.clientY - terminal.getBoundingClientRect().top;
    terminal.classList.add('dragging');
    e.preventDefault();
  });

  /* ── Resize handle ── */
  const resizeHandle = document.getElementById('resize-handle');
  let isResizing = false;
  let resizeStartX = 0;
  let resizeStartY = 0;
  let resizeStartW = 0;
  let resizeStartH = 0;

  resizeHandle.addEventListener('mousedown', (e) => {
    if (isMaximized) return;
    isResizing = true;
    resizeStartX = e.clientX;
    resizeStartY = e.clientY;
    resizeStartW = terminal.offsetWidth;
    resizeStartH = terminal.offsetHeight;
    terminal.classList.add('dragging');
    e.preventDefault();
    e.stopPropagation();
  });

  /* ── Unified mousemove and mouseup handlers ── */
  document.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const rect = terminal.getBoundingClientRect();
      const newLeft = Math.min(Math.max(0, e.clientX - dragOffsetX), window.innerWidth - rect.width);
      const newTop  = Math.min(Math.max(0, e.clientY - dragOffsetY), window.innerHeight - 40);
      terminal.style.left = newLeft + 'px';
      terminal.style.top  = newTop + 'px';
    }

    if (isResizing) {
      const rect = terminal.getBoundingClientRect();
      const maxW = window.innerWidth - rect.left;
      const maxH = window.innerHeight - rect.top;
      const newW = Math.min(maxW, Math.max(320, resizeStartW + (e.clientX - resizeStartX)));
      const newH = Math.min(maxH, Math.max(200, resizeStartH + (e.clientY - resizeStartY)));
      const titlebarHeight = document.getElementById('titlebar').offsetHeight;
      terminal.style.width = newW + 'px';
      terminal.style.maxWidth = newW + 'px';
      terminal.style.height = newH + 'px';
      terminal.querySelector('.body').style.maxHeight = (newH - titlebarHeight) + 'px';
    }
  });

  document.addEventListener('mouseup', () => {
    if (isDragging || isResizing) {
      isDragging = false;
      isResizing = false;
      terminal.classList.remove('dragging');
      cmdInput.focus();
    }
  });

  /* ── Konami code easter egg ── */
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let konamiPos = 0;
  let konamiDone = false;

  document.addEventListener('keydown', (e) => {
    if (isClosed || konamiDone) return;
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (key === KONAMI[konamiPos]) {
      konamiPos++;
      if (konamiPos === KONAMI.length) {
        konamiDone = true;
        triggerEasterEgg();
      }
    } else {
      konamiPos = key === KONAMI[0] ? 1 : 0;
    }
  });

  function triggerEasterEgg() {
    const promptLine = document.createElement('div');
    promptLine.className = 'response-line cmd';
    promptLine.innerHTML = '<span class="ps1">root@localhost:~#</span> ls -la';
    log.appendChild(promptLine);

    const lines = [
      'total 4',
      'drwxr-xr-x  2 root root   64 Jan  1 00:00 <span style="color:var(--accent)">.</span>',
      'drwxr-xr-x 18 root root  576 Jan  1 00:00 <span style="color:var(--accent)">..</span>',
      '-rwxr-xr-x  1 root root  128 Jan  1 00:00 <span style="color:var(--text)">website.sh</span>',
      '<span style="font-style:italic"># that\'s it. there is nothing else.</span>',
    ];

    lines.forEach((line, i) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'response-line info';
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.2s ease';
        el.innerHTML = line;
        log.appendChild(el);
        requestAnimationFrame(() => { el.style.opacity = '1'; });
        log.scrollTop = log.scrollHeight;
      }, i * 120);
    });
  }
</script>
</body>
</html>
